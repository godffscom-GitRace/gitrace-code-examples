<!-- [1220] Web Storage - 브라우저 저장소 -->
<!-- 레벨: 4 | localStorage와 sessionStorage로 브라우저에 데이터를 저장합니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Storage</title>
</head>
<body>
  <h1>Storage</h1>

  <input id="inp" type="text" placeholder="name">
  <button onclick="save()">Save</button>
  <button onclick="load()">Load</button>
  <button onclick="del()">Del</button>

  <p id="out"></p>

  <script>
    function save() {
      const v = document.getElementById("inp").value;
      localStorage.setItem("name", v);
      document.getElementById("out").textContent = "saved " + v;
    }

    function load() {
      const v = localStorage.getItem("name");
      document.getElementById("out").textContent = v ? v : "none";
    }

    function del() {
      localStorage.removeItem("name");
      document.getElementById("out").textContent = "deleted";
    }
  </script>
</body>
</html>
