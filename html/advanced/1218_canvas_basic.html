<!-- [1218] Canvas 기초 - Canvas API -->
<!-- 레벨: 4 | canvas 태그와 JavaScript로 도형을 그립니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Canvas 기초</title>
</head>
<body>
  <h1>Canvas로 그림 그리기</h1>

  <!-- canvas: width/height를 태그에 직접 지정 (CSS 크기와 다름) -->
  <canvas id="myCanvas" width="500" height="400"
    style="border: 2px solid #333; display: block;">
    Canvas를 지원하지 않는 브라우저입니다.
  </canvas>

  <script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d'); // 2D 컨텍스트 가져오기

    // 배경색
    ctx.fillStyle = '#f0f8ff';
    ctx.fillRect(0, 0, 500, 400); // fillRect(x, y, width, height)

    // 사각형 그리기
    ctx.fillStyle = '#FF6B6B';
    ctx.fillRect(50, 50, 120, 80); // 채운 사각형

    ctx.strokeStyle = '#3776AB';
    ctx.lineWidth = 3;
    ctx.strokeRect(220, 50, 120, 80); // 테두리 사각형

    // 원 그리기
    ctx.beginPath();
    ctx.arc(100, 220, 50, 0, Math.PI * 2); // arc(x, y, 반지름, 시작각, 끝각)
    ctx.fillStyle = '#50C878';
    ctx.fill();

    // 반원
    ctx.beginPath();
    ctx.arc(250, 220, 50, 0, Math.PI); // 반원 (0 ~ π)
    ctx.fillStyle = '#FFD700';
    ctx.fill();

    // 선 그리기
    ctx.beginPath();
    ctx.moveTo(50, 320);  // 시작점
    ctx.lineTo(200, 280); // 중간점
    ctx.lineTo(350, 350); // 끝점
    ctx.strokeStyle = '#9B59B6';
    ctx.lineWidth = 4;
    ctx.stroke();

    // 텍스트 그리기
    ctx.fillStyle = '#2C3E50';
    ctx.font = 'bold 20px 나눔고딕, sans-serif';
    ctx.fillText('Canvas로 그린 그림!', 130, 390);
  </script>
</body>
</html>
