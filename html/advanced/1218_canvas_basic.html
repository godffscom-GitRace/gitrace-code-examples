<!-- [1218] Canvas 기초 - Canvas API -->
<!-- 레벨: 4 | canvas 태그와 JavaScript로 도형을 그립니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canvas</title>
</head>
<body>
  <h1>Canvas</h1>

  <canvas id="c" width="300" height="200" style="border:1px solid #333;">
    no canvas
  </canvas>

  <script>
    const c = document.getElementById("c");
    const ctx = c.getContext("2d");

    ctx.fillStyle = "#eee";
    ctx.fillRect(0, 0, 300, 200);

    ctx.fillStyle = "red";
    ctx.fillRect(20, 20, 80, 50);

    ctx.beginPath();
    ctx.arc(150, 100, 30, 0, Math.PI * 2);
    ctx.fillStyle = "blue";
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(20, 150);
    ctx.lineTo(100, 120);
    ctx.lineTo(180, 160);
    ctx.stroke();

    ctx.fillStyle = "black";
    ctx.fillText("draw", 120, 180);
  </script>
</body>
</html>
