<!-- [1219] SVG 기초 - Scalable Vector Graphics -->
<!-- 레벨: 4 | SVG로 벡터 그래픽을 HTML에 직접 그립니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SVG 기초</title>
</head>
<body>
  <h1>SVG - 벡터 그래픽</h1>

  <!-- SVG: 확대해도 깨지지 않는 벡터 이미지 -->
  <svg width="500" height="400" style="border: 2px solid #ccc;">

    <!-- 배경 사각형 -->
    <rect x="0" y="0" width="500" height="400" fill="#f9f9f9"/>

    <!-- rect: 사각형 -->
    <rect x="30" y="30" width="100" height="70"
      fill="#FF6B6B" stroke="#c0392b" stroke-width="2" rx="8"/>

    <!-- circle: 원 -->
    <circle cx="220" cy="80" r="50"
      fill="#3776AB" stroke="#2980b9" stroke-width="2"/>

    <!-- ellipse: 타원 -->
    <ellipse cx="380" cy="80" rx="70" ry="45"
      fill="#50C878" stroke="#27ae60" stroke-width="2"/>

    <!-- line: 직선 -->
    <line x1="30" y1="180" x2="470" y2="180"
      stroke="#666" stroke-width="2" stroke-dasharray="10,5"/>

    <!-- polyline: 꺾은선 -->
    <polyline points="50,350 120,280 200,320 280,250 360,300 440,230"
      fill="none" stroke="#E74C3C" stroke-width="3"/>

    <!-- polygon: 다각형 (별) -->
    <polygon
      points="250,200 263,238 303,238 273,260 283,298 250,278 217,298 227,260 197,238 237,238"
      fill="#FFD700" stroke="#F39C12" stroke-width="2"/>

    <!-- path: 자유 곡선 -->
    <path d="M 50 370 Q 150 310 250 370 T 450 370"
      fill="none" stroke="#9B59B6" stroke-width="3"/>

    <!-- text: 텍스트 -->
    <text x="160" y="395" font-size="16"
      font-family="sans-serif" fill="#2C3E50">
      SVG 도형 모음
    </text>

  </svg>

  <p>SVG는 확대해도 선명하고, CSS와 JavaScript로 제어할 수 있습니다.</p>
</body>
</html>
