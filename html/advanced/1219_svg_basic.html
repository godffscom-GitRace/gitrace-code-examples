<!-- [1219] SVG 기초 - Scalable Vector Graphics -->
<!-- 레벨: 4 | SVG로 벡터 그래픽을 HTML에 직접 그립니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SVG</title>
</head>
<body>
  <h1>SVG</h1>

  <svg width="300" height="200" style="border:1px solid #ccc;">

    <line x1="10" y1="20" x2="290" y2="20" stroke="black"/>

    <circle cx="60" cy="80" r="30" fill="blue"/>

    <polygon points="150,50 180,100 120,100" fill="green"/>

    <text x="100" y="180" font-size="14">svg</text>

  </svg>

  <p>vector image</p>
</body>
</html>
