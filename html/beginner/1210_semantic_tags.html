<!-- [1210] 시맨틱 태그 - Semantic HTML -->
<!-- 레벨: 2 | 의미 있는 HTML5 시맨틱 태그로 문서 구조를 만듭니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>시맨틱 태그</title>
</head>
<body>

  <!-- header: 페이지 상단 영역 -->
  <header>
    <h1>GitRace</h1>
    <nav>
      <a href="/">홈</a> |
      <a href="/examples">예제</a> |
      <a href="/ranking">랭킹</a>
    </nav>
  </header>

  <!-- main: 페이지의 주요 콘텐츠 -->
  <main>

    <!-- article: 독립적인 콘텐츠 단위 -->
    <article>
      <h2>오늘의 예제: 버블 정렬</h2>
      <p>버블 정렬 알고리즘을 타이핑 연습해 보세요.</p>
    </article>

    <!-- aside: 부가 정보 (사이드바) -->
    <aside>
      <h3>나의 통계</h3>
      <p>WPM: 85 | 정확도: 98%</p>
    </aside>

    <!-- section: 관련 콘텐츠 묶음 -->
    <section>
      <h2>인기 언어</h2>
      <p>Python, JavaScript, Java</p>
    </section>

  </main>

  <!-- footer: 페이지 하단 영역 -->
  <footer>
    <p>&copy; 2025 GitRace. 모든 권리 보유.</p>
  </footer>

</body>
</html>
