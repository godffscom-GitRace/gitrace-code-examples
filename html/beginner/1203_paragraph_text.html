<!-- [1203] 단락과 텍스트 서식 - Paragraph & Text -->
<!-- 레벨: 1 | p 태그와 텍스트 강조 태그들을 배웁니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Tags</title>
</head>
<body>
  <h1>Text Tags</h1>

  <p>Paragraph text.</p>

  <p>
    <strong>Bold text</strong><br>
    <em>Italic text</em><br>
    <u>Underline</u><br>
    <mark>Highlight</mark>
  </p>

  <p>Code: <code>let x = 1;</code></p>
  <p>H<sub>2</sub>O and x<sup>2</sup></p>
</body>
</html>
