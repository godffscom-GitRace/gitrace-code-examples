<!-- [1203] 단락과 텍스트 서식 - Paragraph & Text -->
<!-- 레벨: 1 | p 태그와 텍스트 강조 태그들을 배웁니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>텍스트 서식</title>
</head>
<body>
  <h1>텍스트 서식 태그</h1>

  <p>p 태그는 단락(paragraph)을 만듭니다. 줄바꿈이 자동으로 됩니다.</p>

  <p>
    <strong>strong - 굵게 강조 (중요한 내용)</strong><br>
    <em>em - 기울임으로 강조 (emphasis)</em><br>
    <u>u - 밑줄 텍스트</u><br>
    <mark>mark - 형광펜 효과</mark><br>
    <del>del - 취소선 (삭제된 내용)</del><br>
    <small>small - 작은 텍스트 (저작권, 주석)</small>
  </p>

  <p>코드는 <code>code 태그</code>로 표시합니다.</p>
  <p>첨자: H<sub>2</sub>O, x<sup>2</sup> + y<sup>2</sup></p>
</body>
</html>
