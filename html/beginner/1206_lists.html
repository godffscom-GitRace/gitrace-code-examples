<!-- [1206] 목록 태그 - Lists -->
<!-- 레벨: 1 | ul, ol, dl로 다양한 목록을 만드는 방법을 배웁니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lists</title>
</head>
<body>
  <h1>Lists</h1>

  <h2>Fruits</h2>
  <ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Berry</li>
  </ul>

  <h2>Steps</h2>
  <ol>
    <li>Learn HTML</li>
    <li>Add CSS</li>
    <li>Use JS</li>
  </ol>

  <h2>Tech</h2>
  <ul>
    <li>Web
      <ul>
        <li>HTML</li>
        <li>CSS</li>
      </ul>
    </li>
    <li>Server
      <ul>
        <li>Python</li>
      </ul>
    </li>
  </ul>
</body>
</html>
