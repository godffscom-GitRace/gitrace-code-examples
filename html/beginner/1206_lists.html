<!-- [1206] 목록 태그 - Lists -->
<!-- 레벨: 1 | ul, ol, dl로 다양한 목록을 만드는 방법을 배웁니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>목록 태그</title>
</head>
<body>
  <h1>목록(List) 태그</h1>

  <!-- 순서 없는 목록 (Unordered List) -->
  <h2>좋아하는 과일 (ul)</h2>
  <ul>
    <li>사과</li>
    <li>바나나</li>
    <li>딸기</li>
  </ul>

  <!-- 순서 있는 목록 (Ordered List) -->
  <h2>코딩 학습 순서 (ol)</h2>
  <ol>
    <li>HTML 기초 배우기</li>
    <li>CSS로 스타일 적용하기</li>
    <li>JavaScript로 동적 기능 추가</li>
  </ol>

  <!-- 중첩 목록 -->
  <h2>프로그래밍 언어 (중첩)</h2>
  <ul>
    <li>웹
      <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
      </ul>
    </li>
    <li>서버
      <ul>
        <li>Python</li>
        <li>Java</li>
      </ul>
    </li>
  </ul>

  <!-- 정의 목록 (Description List) -->
  <h2>용어 정의 (dl)</h2>
  <dl>
    <dt>HTML</dt>
    <dd>웹 페이지의 구조를 담당하는 마크업 언어</dd>
    <dt>CSS</dt>
    <dd>웹 페이지의 스타일(디자인)을 담당하는 언어</dd>
  </dl>
</body>
</html>
