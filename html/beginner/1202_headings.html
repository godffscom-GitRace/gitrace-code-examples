<!-- [1202] 제목 태그 - Headings -->
<!-- 레벨: 1 | h1부터 h6까지 6단계 제목 태그를 배웁니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heading Tags</title>
</head>
<body>
  <h1>Main Title</h1>
  <h2>Section</h2>
  <h3>Sub</h3>
  <h4>Detail</h4>
  <h5>Note</h5>
  <h6>Small</h6>

  <h2>Features</h2>
  <h3>Typing</h3>
  <p>Use h1 once per page.</p>
</body>
</html>
