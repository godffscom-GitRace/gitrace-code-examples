<!-- [1211] 인라인 스타일 - Inline Styles -->
<!-- 레벨: 2 | style 속성으로 HTML 요소에 직접 스타일을 적용합니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>인라인 스타일</title>
</head>
<body>

  <!-- 색상 -->
  <p style="color: red;">빨간색 텍스트</p>
  <p style="color: #3776AB;">파란색 텍스트 (hex 코드)</p>
  <p style="color: rgb(50, 200, 100);">초록색 텍스트 (RGB)</p>

  <!-- 배경색 -->
  <p style="background-color: yellow; padding: 8px;">노란 배경</p>

  <!-- 글꼴 -->
  <p style="font-size: 24px; font-weight: bold;">큰 굵은 글씨</p>
  <p style="font-style: italic; font-family: Georgia, serif;">이탤릭체</p>

  <!-- 정렬 -->
  <p style="text-align: center;">가운데 정렬</p>
  <p style="text-align: right;">오른쪽 정렬</p>

  <!-- 크기와 간격 -->
  <div style="width: 200px; height: 100px; background: lightcoral; margin: 10px; padding: 15px;">
    너비 200px, 높이 100px
  </div>

  <!-- 테두리 -->
  <p style="border: 2px solid navy; border-radius: 8px; padding: 10px;">
    둥근 테두리
  </p>

</body>
</html>
