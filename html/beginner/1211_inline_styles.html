<!-- [1211] 인라인 스타일 - Inline Styles -->
<!-- 레벨: 2 | style 속성으로 HTML 요소에 직접 스타일을 적용합니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Style</title>
</head>
<body>

  <p style="color: red;">red text</p>
  <p style="color: #3776AB;">blue text</p>
  <p style="color: rgb(50,200,100);">green text</p>

  <p style="background: yellow; padding: 6px;">bg</p>

  <p style="font-size: 20px; font-weight: bold;">big bold</p>
  <p style="font-style: italic;">italic</p>

  <p style="text-align: center;">center</p>
  <p style="text-align: right;">right</p>

  <div style="width: 180px; height: 80px; background: #eee; margin: 8px; padding: 10px;">
    box
  </div>

  <p style="border: 2px solid black; padding: 8px;">
    border
  </p>

</body>
</html>
