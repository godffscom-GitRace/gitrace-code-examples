<!-- [1204] 하이퍼링크 - Hyperlinks -->
<!-- 레벨: 1 | a 태그로 다양한 링크를 만드는 방법을 배웁니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>하이퍼링크</title>
</head>
<body>
  <h1>하이퍼링크 (a 태그)</h1>

  <!-- 외부 링크: target="_blank"로 새 탭에서 열기 -->
  <p>
    <a href="https://www.google.com" target="_blank">구글 바로가기</a>
  </p>

  <!-- 내부 링크: 같은 사이트 내 페이지 이동 -->
  <p>
    <a href="/about.html">소개 페이지</a>
  </p>

  <!-- 앵커 링크: 페이지 내 특정 위치로 이동 -->
  <p>
    <a href="#section2">섹션 2로 이동</a>
  </p>

  <!-- 이메일 링크 -->
  <p>
    <a href="mailto:hello@gitrace.com">이메일 보내기</a>
  </p>

  <!-- 전화 링크 (모바일에서 전화 연결) -->
  <p>
    <a href="tel:010-1234-5678">전화하기</a>
  </p>

  <h2 id="section2">섹션 2</h2>
  <p>앵커 링크로 이동한 위치입니다.</p>
</body>
</html>
