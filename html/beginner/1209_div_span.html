<!-- [1209] div와 span - Block vs Inline -->
<!-- 레벨: 2 | 블록 요소(div)와 인라인 요소(span)의 차이를 배웁니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>div span</title>
</head>
<body>
  <h1>div vs span</h1>

  <div style="background: lightblue; padding: 8px;">
    block element
  </div>
  <div style="background: lightgreen; padding: 8px;">
    next line
  </div>

  <p>
    text with <span style="color: red;">red</span>
    and <span style="font-weight: bold;">bold</span>
  </p>

  <h2>layout</h2>
  <div style="display: flex; gap: 8px;">
    <div style="background: #eee; padding: 8px; flex: 1;">left</div>
    <div style="background: #ccc; padding: 8px; flex: 1;">right</div>
  </div>
</body>
</html>
