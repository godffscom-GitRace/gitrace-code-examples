<!-- [1207] 테이블 - Tables -->
<!-- 레벨: 2 | table, thead, tbody, th, td로 표를 만드는 방법을 배웁니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Table</title>
</head>
<body>
  <h1>Table</h1>

  <table border="1">
    <thead>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Job</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Alex</td>
        <td>28</td>
        <td>Dev</td>
      </tr>
      <tr>
        <td>Emma</td>
        <td>25</td>
        <td>Design</td>
      </tr>
    </tbody>
  </table>

  <h2>Merge</h2>
  <table border="1">
    <tr>
      <th colspan="2">Name Age</th>
      <th>Job</th>
    </tr>
    <tr>
      <td rowspan="2">Sam</td>
      <td>30</td>
      <td>Free</td>
    </tr>
    <tr>
      <td>Side</td>
      <td>Teach</td>
    </tr>
  </table>
</body>
</html>
