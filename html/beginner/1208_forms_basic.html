<!-- [1208] 폼 기초 - Basic Forms -->
<!-- 레벨: 2 | form, input, button으로 기본 입력 양식을 만듭니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>폼 기초</title>
</head>
<body>
  <h1>로그인 폼</h1>

  <!-- action: 데이터를 전송할 URL, method: GET 또는 POST -->
  <form action="/login" method="POST">

    <!-- label의 for와 input의 id를 연결 -->
    <label for="username">아이디</label><br>
    <input type="text" id="username" name="username" placeholder="아이디 입력"><br><br>

    <label for="password">비밀번호</label><br>
    <input type="password" id="password" name="password" placeholder="비밀번호 입력"><br><br>

    <!-- submit: 폼 전송, reset: 초기화 -->
    <button type="submit">로그인</button>
    <button type="reset">초기화</button>
  </form>

  <h2>검색 폼</h2>
  <form action="/search" method="GET">
    <input type="search" name="q" placeholder="검색어를 입력하세요">
    <button type="submit">검색</button>
  </form>
</body>
</html>
