<!-- [1208] 폼 기초 - Basic Forms -->
<!-- 레벨: 2 | form, input, button으로 기본 입력 양식을 만듭니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form</title>
</head>
<body>
  <h1>Login</h1>

  <form action="/login" method="POST">
    <label for="user">User</label><br>
    <input type="text" id="user" name="user" placeholder="enter user"><br><br>

    <label for="pass">Pass</label><br>
    <input type="password" id="pass" name="pass" placeholder="enter pass"><br><br>

    <button type="submit">Send</button>
  </form>

  <h2>Search</h2>
  <form action="/search" method="GET">
    <input type="search" name="q" placeholder="type here">
    <button type="submit">Go</button>
  </form>
</body>
</html>
