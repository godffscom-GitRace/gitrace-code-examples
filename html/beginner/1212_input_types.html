<!-- [1212] 다양한 Input 타입 - Input Types -->
<!-- 레벨: 2 | HTML5의 다양한 input 타입과 속성을 배웁니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inputs</title>
</head>
<body>
  <h1>Inputs</h1>
  <form>

    <p><input type="text" placeholder="name"></p>
    <p><input type="email" placeholder="mail"></p>
    <p><input type="number" value="10"></p>
    <p><input type="date"></p>

    <p>
      <label><input type="checkbox" name="a"> A</label>
      <label><input type="checkbox" name="b"> B</label>
    </p>

    <p>
      <label><input type="radio" name="lv"> Low</label>
      <label><input type="radio" name="lv"> High</label>
    </p>

    <button type="submit">Send</button>
  </form>
</body>
</html>
