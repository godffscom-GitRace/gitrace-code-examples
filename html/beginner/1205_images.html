<!-- [1205] 이미지 삽입 - Images -->
<!-- 레벨: 1 | img 태그로 이미지를 삽입하는 방법을 배웁니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Images</title>
</head>
<body>
  <h1>Images</h1>

  <img src="cat.jpg" alt="cat">

  <img src="logo.png" alt="logo" width="200" height="100">

  <img src="https://via.placeholder.com/200" alt="sample" width="200">

  <figure>
    <img src="city.jpg" alt="city" width="300">
    <figcaption>City view</figcaption>
  </figure>

  <p>Alt shows if image fails.</p>
</body>
</html>
