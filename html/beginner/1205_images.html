<!-- [1205] 이미지 삽입 - Images -->
<!-- 레벨: 1 | img 태그로 이미지를 삽입하는 방법을 배웁니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>이미지 삽입</title>
</head>
<body>
  <h1>이미지 삽입 (img 태그)</h1>

  <!-- 기본 이미지: src=경로, alt=대체 텍스트(필수!) -->
  <img src="cat.jpg" alt="귀여운 고양이 사진">

  <!-- 크기 지정 -->
  <img src="logo.png" alt="GitRace 로고" width="200" height="100">

  <!-- 외부 URL 이미지 -->
  <img
    src="https://via.placeholder.com/300x200"
    alt="예시 이미지"
    width="300"
  >

  <!-- figure/figcaption: 이미지 + 설명 -->
  <figure>
    <img src="seoul.jpg" alt="서울 야경" width="400">
    <figcaption>서울의 아름다운 야경 (사진: 김철수)</figcaption>
  </figure>

  <p>alt 속성은 이미지가 로드 실패하거나 스크린리더 사용 시 표시됩니다.</p>
</body>
</html>
