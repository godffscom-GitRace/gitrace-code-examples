<!-- [1216] 데이터 속성 - Data Attributes -->
<!-- 레벨: 3 | data-* 속성으로 HTML에 커스텀 데이터를 저장하고 JS에서 읽습니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>데이터 속성</title>
</head>
<body>
  <h1>data-* 속성</h1>

  <!-- data-속성명: 원하는 이름으로 데이터 저장 -->
  <div
    data-user-id="1042"
    data-user-name="김철수"
    data-level="advanced"
    data-score="9850">
    김철수 님의 프로필 카드
  </div>

  <!-- 상품 목록 예시 -->
  <h2>상품 목록</h2>
  <ul>
    <li data-product-id="P001" data-price="15000" data-stock="50">
      파이썬 교재 - 15,000원
    </li>
    <li data-product-id="P002" data-price="23000" data-stock="0">
      자바스크립트 완벽 가이드 - 23,000원 (품절)
    </li>
    <li data-product-id="P003" data-price="18000" data-stock="12">
      HTML/CSS 입문 - 18,000원
    </li>
  </ul>

  <!-- JavaScript로 data 속성 읽기 -->
  <script>
    const div = document.querySelector('[data-user-id]');

    // dataset으로 접근 (data- 제거, 카멜케이스 변환)
    const userId = div.dataset.userId;     // "1042"
    const userName = div.dataset.userName; // "김철수"
    const level = div.dataset.level;       // "advanced"

    console.log(`사용자: ${userName} (ID: ${userId})`);
    console.log(`레벨: ${level}`);

    // 상품 data 읽기
    const items = document.querySelectorAll('[data-product-id]');
    items.forEach(item => {
      const price = item.dataset.price;
      const stock = parseInt(item.dataset.stock);
      if (stock === 0) {
        item.style.color = 'gray';
      }
      console.log(`상품 ${item.dataset.productId}: ${price}원`);
    });
  </script>
</body>
</html>
