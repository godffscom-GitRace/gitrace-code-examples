<!-- [1216] 데이터 속성 - Data Attributes -->
<!-- 레벨: 3 | data-* 속성으로 HTML에 커스텀 데이터를 저장하고 JS에서 읽습니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Data</title>
</head>
<body>
  <h1>data attr</h1>

  <div data-id="1" data-name="alex" data-level="pro">
    user card
  </div>

  <h2>items</h2>
  <ul>
    <li data-id="a1" data-price="10">book</li>
    <li data-id="a2" data-price="20">code</li>
  </ul>

  <script>
    const box = document.querySelector("[data-id]");
    const name = box.dataset.name;
    const level = box.dataset.level;

    console.log("user " + name + " " + level);

    const list = document.querySelectorAll("li");
    list.forEach(item => {
      const price = item.dataset.price;
      console.log("item " + price);
    });
  </script>
</body>
</html>
