<!-- [1217] 웹 접근성 - Web Accessibility -->
<!-- 레벨: 3 | aria 속성과 시맨틱 태그로 접근성 높은 웹을 만듭니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ARIA</title>
</head>
<body>

  <a href="#main" aria-label="skip">Skip</a>

  <nav role="navigation" aria-label="menu">
    <a href="/">Home</a>
    <a href="/docs">Docs</a>
  </nav>

  <main id="main" role="main">
    <h1>ARIA</h1>

    <button aria-label="open">Btn</button>

    <span aria-hidden="true">*</span>
    <span>text</span>

    <button aria-expanded="false">Menu</button>
    <ul hidden>
      <li>One</li>
      <li>Two</li>
    </ul>

    <img src="img.png" alt="chart">

    <form>
      <label for="mail">Mail</label>
      <input type="email" id="mail" aria-required="true">
    </form>

  </main>
</body>
</html>
