<!-- [1214] 메타 태그 - Meta Tags -->
<!-- 레벨: 3 | SEO와 소셜 공유를 위한 meta 태그들을 배웁니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <!-- 반응형 디자인을 위한 viewport 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO: 검색엔진 설명 -->
  <meta name="description" content="GitRace - 코드 타이핑으로 실력을 키우는 개발자 플랫폼">
  <meta name="keywords" content="코딩, 타이핑, 개발자, 연습">
  <meta name="author" content="GitRace Team">

  <!-- Open Graph: 소셜미디어 공유 시 표시 -->
  <meta property="og:title" content="GitRace - 코드 타이핑 플랫폼">
  <meta property="og:description" content="코드를 타이핑하며 프로그래밍 실력을 키워보세요">
  <meta property="og:image" content="https://gitrace.com/og-image.png">
  <meta property="og:url" content="https://gitrace.com">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="GitRace">
  <meta name="twitter:description" content="코드 타이핑 플랫폼">

  <!-- 검색엔진 인덱싱 제어 -->
  <meta name="robots" content="index, follow">

  <!-- 5초 후 다른 페이지로 리다이렉트 (필요 시) -->
  <!-- <meta http-equiv="refresh" content="5; url=/home"> -->

  <title>GitRace - 코드 타이핑 플랫폼</title>
</head>
<body>
  <h1>메타 태그 예시</h1>
  <p>head 태그 안의 meta 태그들은 페이지에 보이지 않지만 SEO와 공유에 중요합니다.</p>
  <p>개발자 도구(F12) > Elements 탭에서 확인해보세요.</p>
</body>
</html>
