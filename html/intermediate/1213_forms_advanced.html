<!-- [1213] 폼 심화 - Advanced Forms -->
<!-- 레벨: 3 | select, textarea, fieldset으로 고급 폼을 만듭니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>폼 심화</title>
</head>
<body>
  <h1>회원가입 폼</h1>

  <form action="/register" method="POST">

    <!-- fieldset: 관련 입력 요소 묶기 -->
    <fieldset>
      <legend>기본 정보</legend>

      <p>
        <label for="name">이름 *</label><br>
        <input type="text" id="name" name="name" required maxlength="20">
      </p>

      <p>
        <label for="birth">생년월일</label><br>
        <input type="date" id="birth" name="birth">
      </p>

      <!-- select: 드롭다운 선택 -->
      <p>
        <label for="job">직업</label><br>
        <select id="job" name="job">
          <option value="">-- 선택하세요 --</option>
          <optgroup label="IT">
            <option value="frontend">프론트엔드 개발자</option>
            <option value="backend">백엔드 개발자</option>
            <option value="designer">UI/UX 디자이너</option>
          </optgroup>
          <optgroup label="기타">
            <option value="student">학생</option>
            <option value="other">기타</option>
          </optgroup>
        </select>
      </p>
    </fieldset>

    <fieldset>
      <legend>추가 정보</legend>

      <!-- textarea: 여러 줄 입력 -->
      <p>
        <label for="intro">자기소개</label><br>
        <textarea id="intro" name="intro" rows="4" cols="40"
          placeholder="간단한 자기소개를 입력하세요..."></textarea>
      </p>

      <!-- multiple select: 다중 선택 -->
      <p>
        <label for="skills">보유 기술 (Ctrl+클릭으로 다중 선택)</label><br>
        <select id="skills" name="skills" multiple size="4">
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="js">JavaScript</option>
          <option value="python">Python</option>
        </select>
      </p>
    </fieldset>

    <button type="submit">가입하기</button>
    <button type="reset">초기화</button>
  </form>
</body>
</html>
