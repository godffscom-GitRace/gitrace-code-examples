<!-- [1215] 미디어 태그 - Media Tags -->
<!-- 레벨: 3 | video, audio, iframe으로 미디어를 삽입하는 방법을 배웁니다 -->

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>미디어 태그</title>
</head>
<body>
  <h1>미디어 태그</h1>

  <!-- video: 동영상 삽입 -->
  <h2>동영상 (video)</h2>
  <video width="640" height="360" controls poster="thumbnail.jpg">
    <!-- source: 여러 형식 지원 (브라우저가 지원하는 첫 번째 선택) -->
    <source src="intro.mp4" type="video/mp4">
    <source src="intro.webm" type="video/webm">
    <p>브라우저가 video 태그를 지원하지 않습니다.</p>
  </video>

  <!-- audio: 오디오 삽입 -->
  <h2>오디오 (audio)</h2>
  <audio controls loop>
    <source src="bgm.mp3" type="audio/mpeg">
    <source src="bgm.ogg" type="audio/ogg">
    <p>브라우저가 audio 태그를 지원하지 않습니다.</p>
  </audio>

  <!-- iframe: 외부 페이지나 지도 삽입 -->
  <h2>외부 콘텐츠 (iframe)</h2>
  <iframe
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    width="560"
    height="315"
    frameborder="0"
    allowfullscreen
    title="유튜브 영상">
  </iframe>

  <!-- 구글 지도 삽입 예시 -->
  <h2>지도 삽입</h2>
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!..."
    width="600"
    height="400"
    style="border: 0;"
    allowfullscreen
    loading="lazy"
    title="서울 지도">
  </iframe>
</body>
</html>
