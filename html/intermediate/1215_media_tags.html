<!-- [1215] 미디어 태그 - Media Tags -->
<!-- 레벨: 3 | video, audio, iframe으로 미디어를 삽입하는 방법을 배웁니다 -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media</title>
</head>
<body>
  <h1>Media</h1>

  <h2>Video</h2>
  <video width="320" controls>
    <source src="video.mp4" type="video/mp4">
    <p>No video support</p>
  </video>

  <h2>Audio</h2>
  <audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    <p>No audio support</p>
  </audio>

  <h2>Frame</h2>
  <iframe src="https://example.com" width="300" height="200" title="frame"></iframe>
</body>
</html>
